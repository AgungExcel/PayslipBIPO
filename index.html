<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payslip PDF Editor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div>
          <h1>Payslip PDF Editor</h1>
          <p>Search, preview, edit area tertentu, autosave, dan print</p>
        </div>
        <div class="badge">Drive Folder Hardcoded</div>
      </div>

      <section class="card">
        <div class="field-group">
          <label for="periodSelect">Periode</label>
          <select id="periodSelect"></select>
        </div>
        <div class="field-group">
          <label for="searchInput">Cari No ID / Nama</label>
          <input id="searchInput" type="search" placeholder="Contoh: SR260033 atau BAROKAH" autocomplete="off" />
        </div>
        <div class="field-group">
          <label for="employeeSelect">Hasil</label>
          <select id="employeeSelect" size="8"></select>
        </div>
        <div class="toolbar two-col">
          <button id="refreshBtn" class="btn btn-light">Refresh</button>
          <button id="syncBtn" class="btn btn-light">Reload Preview</button>
        </div>
      </section>

      <section class="card">
        <div class="section-head">
          <h2>Area Edit</h2>
          <button id="addAreaBtn" class="btn btn-primary btn-sm">Tambah Area</button>
        </div>
        <div class="field-group compact-grid">
          <div>
            <label for="areaPage">Page</label>
            <input id="areaPage" type="number" min="1" value="1" />
          </div>
          <div>
            <label for="areaFontSize">Font</label>
            <input id="areaFontSize" type="number" min="6" max="40" value="12" />
          </div>
          <div>
            <label for="areaX">X</label>
            <input id="areaX" type="number" min="0" step="0.1" value="30" />
          </div>
          <div>
            <label for="areaY">Y</label>
            <input id="areaY" type="number" min="0" step="0.1" value="50" />
          </div>
          <div>
            <label for="areaWidth">Width</label>
            <input id="areaWidth" type="number" min="10" step="0.1" value="140" />
          </div>
          <div>
            <label for="areaHeight">Height</label>
            <input id="areaHeight" type="number" min="8" step="0.1" value="14" />
          </div>
        </div>
        <div class="field-group">
          <label for="areaLabel">Nama Area</label>
          <input id="areaLabel" type="text" placeholder="Misal: Net Salary" />
        </div>
        <div class="field-group">
          <label for="areaText">Isi Teks</label>
          <textarea id="areaText" rows="3" placeholder="Teks pengganti"></textarea>
        </div>
        <div class="toolbar three-col">
          <button id="updateAreaBtn" class="btn btn-light">Update Area</button>
          <button id="deleteAreaBtn" class="btn btn-danger">Hapus</button>
          <button id="saveBtn" class="btn btn-success">Save / Timpa PDF</button>
        </div>
        <div class="field-group">
          <label>Daftar Area</label>
          <div id="areaList" class="area-list empty">Belum ada area edit.</div>
        </div>
      </section>

      <section class="card status-card">
        <div><strong>Status:</strong> <span id="statusText">Menunggu</span></div>
        <div><strong>File:</strong> <span id="fileNameText">-</span></div>
        <div><strong>ID:</strong> <span id="employeeIdText">-</span></div>
        <div><strong>Nama:</strong> <span id="employeeNameText">-</span></div>
      </section>
    </aside>

    <main class="main-stage">
      <div class="preview-toolbar">
        <div class="left-actions">
          <button id="printBtn" class="btn btn-primary">Print</button>
          <button id="downloadBtn" class="btn btn-light">Download PDF</button>
        </div>
        <div class="right-actions">
          <span id="pageInfo">Page 1 / 1</span>
          <button id="zoomOutBtn" class="btn btn-light btn-sm">-</button>
          <button id="zoomInBtn" class="btn btn-light btn-sm">+</button>
        </div>
      </div>

      <div class="viewer-shell">
        <div id="pdfContainer" class="pdf-container"></div>
      </div>
    </main>
  </div>

  <template id="areaItemTemplate">
    <button class="area-item" type="button">
      <div class="area-item-title"></div>
      <div class="area-item-subtitle"></div>
    </button>
  </template>

  <script type="module" src="./app.js"></script>
</body>
</html>
