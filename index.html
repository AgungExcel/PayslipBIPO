<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payslip BIPO</title>
  <link rel="icon" type="image/png" href="./favicon-bipo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.mjs" type="module"></script>
  <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand-row">
        <div class="brand-left">
          <img id="brandLogo" class="brand-logo" src="./hoplun.jpg" alt="Payslip BIP Logo" />
          <div>
            <h1>Payslip BIP</h1>
            <div class="db-status" id="dbStatusWrap">
              <span id="dbStatusDot" class="db-status-dot"></span>
              <span id="dbStatusText">Belum terhubung</span>
            </div>
          </div>
        </div>
        <button id="settingsBtn" class="icon-btn" title="Pengaturan">⚙</button>
      </div>

      <section class="card search-card">
        <div class="field-group">
          <label for="periodSelect">Periode</label>
          <select id="periodSelect"></select>
        </div>
        <div class="field-group search-field">
          <label for="searchInput">Cari No ID / Nama</label>
          <input id="searchInput" type="search" placeholder="Ketik No ID atau Nama..." autocomplete="off" />
          <div id="searchResults" class="search-results hidden"></div>
        </div>
        <div class="toolbar two-col compact-actions">
          <button id="refreshBtn" class="btn btn-light">↻ Refresh</button>
          <button id="syncBtn" class="btn btn-light">⟳ Reload</button>
        </div>
      </section>

      <section class="card status-card">
        <div><strong>Status</strong><span id="statusText">Menunggu</span></div>
        <div><strong>File</strong><span id="fileNameText">-</span></div>
        <div><strong>ID</strong><span id="employeeIdText">-</span></div>
        <div><strong>Nama</strong><span id="employeeNameText">-</span></div>
      </section>
    </aside>

    <main class="main-stage">
      <div class="preview-toolbar">
        <div class="toolbar-title-group">
          <div class="toolbar-title">Preview Payslip</div>
          <div class="toolbar-subtitle">Klik area teks untuk edit langsung. Double click area kosong untuk tambah area baru.</div>
        </div>
        <div class="right-actions">
          <span id="pageInfo">Page 1 / 1</span>
          <button id="zoomOutBtn" class="btn btn-light btn-sm">−</button>
          <button id="zoomInBtn" class="btn btn-light btn-sm">＋</button>
          <button id="printBtn" class="btn btn-premium">🖨 Print</button>
        </div>
      </div>

      <div class="viewer-shell">
        <div id="pdfContainer" class="pdf-container"></div>
      </div>
    </main>
  </div>

  <div id="settingsModal" class="modal hidden">
    <div class="modal-backdrop" data-close-settings="1"></div>
    <div class="modal-panel">
      <div class="modal-head">
        <h2>Pengaturan</h2>
        <button class="icon-btn" data-close-settings="1">✕</button>
      </div>
      <div class="field-group">
        <label for="titleInput">Judul</label>
        <input id="titleInput" type="text" value="Payslip BIP" />
      </div>
      <div class="field-group">
        <label for="logoInput">Logo</label>
        <input id="logoInput" type="file" accept="image/*" />
      </div>
      <div class="toolbar two-col">
        <button id="resetLogoBtn" class="btn btn-light">Reset Logo</button>
        <button id="saveSettingsBtn" class="btn btn-primary">Simpan</button>
      </div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
